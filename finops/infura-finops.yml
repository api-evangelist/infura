specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Infura
providerId: infura
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Web3
- Blockchain
- RPC
- Infrastructure
- MetaMask
- ConsenSys
- FinOps
- FOCUS
description: Infura bills as monthly subscription with daily credit allotments. Overage
  handling depends on plan; Custom is contracted.
notes: Usage data viewable in MetaMask Developer dashboard. Invoiced via ConsenSys.
sources:
- https://docs.metamask.io/services/get-started/pricing/
- https://focus.finops.org/focus-specification/v1-3/
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: ConsenSys (MetaMask)
serviceCategory: Web3
billingModel:
  pricingCategory: Subscription + Credits
  billingFrequency: Monthly
  billingCurrency: USD
  chargeCategories:
  - Usage
  - Purchase
focusColumns:
  ServiceName: Infura
  ServiceCategory: Web3
  ProviderName: Infura
  PublisherName: ConsenSys
  InvoiceIssuerName: ConsenSys
  BillingCurrency: USD
  ChargeCategory: Usage
meters:
- name: credits
  description: Daily request credits weighted per method.
  unit: credit
  aggregation: sum
  dimensions:
  - api_key
  - network
  - method
- name: ipfs_storage
  description: IPFS pinned bytes.
  unit: byte
  aggregation: max
  dimensions:
  - account
principles:
- name: Visibility
  description: Monitor credit burn in the MetaMask Developer dashboard.
- name: Allocation
  description: Use one project key per environment/team to attribute credits.
- name: Optimization
  description: Cache responses; avoid archive unless required; use eth_getLogs windows
    judiciously.
- name: Accountability
  description: Designate project owners; review against daily allotment.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
