specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Infura
providerId: infura
created: '2026-05-08'
modified: '2026-05-08'
reconciled: true
tags:
- Web3
- Blockchain
- RPC
- Infrastructure
- MetaMask
- ConsenSys
- Rate Limiting
description: Infura enforces credits-per-second throughput plus daily credit caps.
  Different methods cost different credits.
notes: WebSocket subscriptions and archive calls consume more credits per request.
sources:
- https://docs.metamask.io/services/get-started/pricing/
responseCodes:
  throttled: 429
limits:
- name: Free Throughput
  scope: api_key
  metric: credits_per_second
  limit: 500
  notes: Free tier.
- name: Developer Throughput
  scope: api_key
  metric: credits_per_second
  limit: 4000
  notes: Developer tier.
- name: Team Throughput
  scope: api_key
  metric: credits_per_second
  limit: 40000
  notes: Team tier.
- name: Daily Credit Cap
  scope: account
  metric: credits
  limit: see plan
  notes: Daily ceiling per plan.
policies:
- name: Backoff Strategy
  description: Exponential backoff with jitter on 429.
- name: Method Selection
  description: Prefer non-archive RPC and avoid heavy debug_/trace_ calls when on
    lower tiers.
maintainers:
- FN: Kin Lane
  email: kin@apievangelist.com
